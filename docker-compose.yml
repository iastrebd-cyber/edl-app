version: '3.9'

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eld_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       eld_dev
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eld_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:              production
      PORT:                  3000
      DB_HOST:               postgres
      DB_PORT:               5432
      DB_NAME:               eld_dev
      DB_USER:               postgres
      DB_PASSWORD:           ${DB_PASSWORD}
      JWT_ACCESS_SECRET:     ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:    ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN:30d
      CORS_ORIGINS:          ${CORS_ORIGINS}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Driver App ───────────────────────────────────────────────────────
  frontend-driver:
    build:
      context: ./frontend-driver
      dockerfile: Dockerfile
    container_name: eld_driver
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

  # ── Dispatcher App ───────────────────────────────────────────────────
  frontend-dispatcher:
    build:
      context: ./frontend-dispatcher
      dockerfile: Dockerfile
    container_name: eld_dispatcher
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:80"

volumes:
  postgres_data:
