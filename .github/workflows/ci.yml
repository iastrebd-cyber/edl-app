# C:\Users\RegenU3\eld-app\.github\workflows\ci.yml
#
# CI/CD Pipeline для ELD App
#
# Запускается при:
#   - push в main ветку
#   - pull request в main
#
# Шаги:
#   1. Lint и проверка кода
#   2. Сборка Docker образов
#   3. Деплой на сервер (при push в main)

name: ELD App CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Проверка бэкенда ────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eld_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run migrations
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: eld_test
          DB_USER: postgres
          DB_PASSWORD: testpassword
          JWT_ACCESS_SECRET: test_secret_access
          JWT_REFRESH_SECRET: test_secret_refresh
        run: npx knex migrate:latest --env test

      - name: Health check
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: eld_test
          DB_USER: postgres
          DB_PASSWORD: testpassword
          JWT_ACCESS_SECRET: test_secret_access
          JWT_REFRESH_SECRET: test_secret_refresh
          CORS_ORIGINS: http://localhost:3000
          PORT: 3001
        run: |
          node server.js &
          sleep 5
          curl -f http://localhost:3001/health || exit 1
          kill %1

  # ── Job 2: Сборка фронтендов ───────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Driver App
        working-directory: frontend-driver
        run: |
          npm ci
          npm run build

      - name: Build Dispatcher App
        working-directory: frontend-dispatcher
        run: |
          npm ci
          npm run build

  # ── Job 3: Docker Build ────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: eld-app-backend:latest

      - name: Build driver image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-driver
          push: false
          tags: eld-app-driver:latest

      - name: Build dispatcher image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-dispatcher
          push: false
          tags: eld-app-dispatcher:latest
